<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>resuml — Live Resume Builder</title>
  <meta name="description" content="Build your resume live in the browser. YAML editor, form mode, 50+ themes, ATS scoring, PDF export. Free and open source.">
  <meta property="og:title" content="resuml — Live Resume Builder">
  <meta property="og:description" content="Build your resume live in the browser with YAML or form mode. ATS scoring, theme switching, PDF export.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://phoinixi.github.io/resuml/">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📄</text></svg>">
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface2: #0d1117;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #b1bac4;
      --accent: #58a6ff;
      --accent2: #a5b4fc;
      --green: #4ade80;
      --yellow: #fbbf24;
      --orange: #fb923c;
      --red: #ef4444;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      display: flex;
      flex-direction: column;
    }
    #app {
      display: flex;
      flex-direction: column;
      height: 100%;
      overflow: hidden;
    }

    /* Toolbar */
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 48px;
      padding: 0 12px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      gap: 8px;
    }
    .toolbar-left, .toolbar-center, .toolbar-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .toolbar-brand {
      font-weight: 800;
      font-size: 1.1rem;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-right: 12px;
    }
    .toolbar-mode-toggle {
      display: flex;
      background: var(--bg);
      border-radius: 6px;
      overflow: hidden;
      border: 1px solid var(--border);
    }
    .toolbar-mode-btn {
      background: none;
      border: none;
      color: var(--text);
      padding: 5px 16px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }
    .toolbar-mode-btn.active {
      background: var(--accent);
      color: #000;
    }
    .toolbar-mode-btn:hover:not(.active) {
      color: var(--text);
    }
    .toolbar-theme-btn {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 4px 16px;
      border-radius: 6px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: border-color 0.15s;
      white-space: nowrap;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .toolbar-theme-btn:hover {
      border-color: var(--accent);
    }
    .toolbar-btn {
      background: none;
      border: 1px solid transparent;
      color: var(--text);
      padding: 5px 12px;
      border-radius: 6px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .toolbar-btn:hover {
      background: var(--surface);
      border-color: var(--border);
    }
    .toolbar-btn.active {
      color: var(--accent);
      border-color: var(--accent);
      background: rgba(88, 166, 255, 0.1);
    }

    /* Download dropdown */
    .download-dropdown {
      position: relative;
    }
    .download-dropdown-menu {
      position: absolute;
      top: calc(100% + 4px);
      left: 50%;
      transform: translateX(-50%);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 4px;
      min-width: 140px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
      z-index: 100;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .download-dropdown-item {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      padding: 8px 12px;
      background: none;
      border: none;
      border-radius: 6px;
      color: var(--text);
      font-size: 0.8rem;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }
    .download-dropdown-item:hover {
      background: var(--bg);
    }
    .download-dropdown-item:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .download-dropdown-icon {
      font-size: 1rem;
    }

    /* Main layout */
    .builder-main {
      display: flex;
      flex: 1;
      overflow: hidden;
      position: relative;
    }
    .builder-editor {
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .builder-divider {
      width: 6px;
      cursor: col-resize;
      background: var(--border);
      flex-shrink: 0;
      transition: background 0.15s;
    }
    .builder-divider:hover {
      background: var(--accent);
    }
    .builder-main.dragging {
      cursor: col-resize;
      user-select: none;
    }
    .builder-main.dragging iframe,
    .builder-main.dragging .cm-editor {
      pointer-events: none;
    }
    .builder-preview {
      overflow: hidden;
      display: flex;
    }

    /* Editor */
    .editor-container {
      display: flex;
      flex-direction: column;
      height: 100%;
      background: var(--surface2);
    }
    .editor-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .editor-title {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text);
      font-family: 'SF Mono', monospace;
    }
    .editor-error {
      font-size: 0.75rem;
      color: var(--red);
      background: rgba(239, 68, 68, 0.1);
      padding: 2px 8px;
      border-radius: 4px;
      font-weight: 600;
    }
    .editor-body {
      flex: 1;
      overflow: auto;
      background: #0d1117;
    }
    .editor-body .cm-editor {
      height: 100%;
    }

    /* Preview */
    .preview-container {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fff;
    }
    .preview-iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
    .preview-loading, .preview-error, .preview-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      color: var(--muted);
      font-size: 0.9rem;
      background: var(--bg);
      width: 100%;
      height: 100%;
      justify-content: center;
    }
    .preview-error { color: var(--orange); }
    .preview-progress-bar {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 3px;
      z-index: 10;
      background: linear-gradient(90deg, transparent 0%, var(--accent) 50%, transparent 100%);
      background-size: 200% 100%;
      animation: progress-slide 1.2s ease-in-out infinite;
    }
    @keyframes progress-slide {
      0% { background-position: 100% 0; }
      100% { background-position: -100% 0; }
    }
    .spinner {
      width: 24px;
      height: 24px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Form mode */
    .form-container {
      height: 100%;
      overflow: auto;
      padding: 16px;
      background: var(--surface2);
    }
    .form-empty { color: var(--muted); text-align: center; padding: 40px; }
    .form-section {
      margin-bottom: 8px;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }
    .form-section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      padding: 10px 16px;
      background: var(--surface);
      border: none;
      color: var(--text);
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      text-align: left;
    }
    .form-section-header:hover { background: var(--border); }
    .form-section-chevron { color: var(--muted); }
    .form-section-body { padding: 12px 16px; }
    .form-field { margin-bottom: 10px; }
    .form-label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .form-input, .form-textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 0.85rem;
      font-family: inherit;
      transition: border-color 0.15s;
    }
    .form-input:focus, .form-textarea:focus {
      outline: none;
      border-color: var(--accent);
    }
    .form-textarea { resize: vertical; min-height: 60px; }
    .form-entry {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 8px;
      background: var(--bg);
    }
    .form-entry-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .form-entry-title { font-weight: 600; font-size: 0.9rem; }
    .form-entry-remove, .form-list-remove {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 1.2rem;
      cursor: pointer;
      padding: 0 4px;
      transition: color 0.15s;
    }
    .form-entry-remove:hover, .form-list-remove:hover { color: var(--red); }
    .form-list-item {
      display: flex;
      gap: 4px;
      margin-bottom: 4px;
      align-items: center;
    }
    .form-input-list { flex: 1; }
    .form-add-btn, .form-add-entry {
      background: none;
      border: 1px dashed var(--border);
      color: var(--muted);
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 0.8rem;
      cursor: pointer;
      width: 100%;
      margin-top: 4px;
      transition: all 0.15s;
    }
    .form-add-btn:hover, .form-add-entry:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ATS Panel */
    .builder-ats {
      position: absolute;
      right: 0;
      top: 0;
      bottom: 0;
      width: 320px;
      z-index: 10;
      box-shadow: -4px 0 20px rgba(0,0,0,0.3);
    }
    .ats-panel {
      height: 100%;
      background: var(--surface);
      border-left: 1px solid var(--border);
      overflow: auto;
    }
    .ats-panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      font-weight: 700;
    }
    .ats-panel-close {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 1.3rem;
      cursor: pointer;
    }
    .ats-panel-close:hover { color: var(--text); }
    .ats-panel-empty {
      padding: 40px 16px;
      text-align: center;
      color: var(--muted);
    }
    .ats-panel-score {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 16px;
    }
    .ats-score-circle {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 4px solid;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin-bottom: 8px;
    }
    .ats-score-number { font-size: 1.6rem; font-weight: 800; }
    .ats-score-label { font-size: 0.7rem; color: var(--muted); }
    .ats-rating { font-weight: 700; font-size: 0.9rem; text-transform: capitalize; }
    .ats-panel-checks { padding: 0 16px 16px; }
    .ats-category { margin-bottom: 12px; }
    .ats-category-title {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }
    .ats-check {
      display: flex;
      gap: 8px;
      padding: 4px 0;
      font-size: 0.85rem;
    }
    .ats-check-icon {
      flex-shrink: 0;
      width: 16px;
      text-align: center;
    }
    .ats-check.passed .ats-check-icon { color: var(--green); }
    .ats-check.failed .ats-check-icon { color: var(--orange); }
    .ats-check-content { flex: 1; }
    .ats-check-msg { display: block; }
    .ats-check-suggestion {
      display: block;
      font-size: 0.8rem;
      color: var(--muted);
      font-style: italic;
      margin-top: 2px;
    }
    .ats-keywords { padding: 0 16px 16px; }
    .ats-kw-group { margin-bottom: 8px; }
    .ats-kw-label { font-size: 0.8rem; font-weight: 600; display: block; margin-bottom: 4px; }
    .ats-kw-label.matched { color: var(--green); }
    .ats-kw-label.missing { color: var(--orange); }
    .ats-kw-tags { display: flex; flex-wrap: wrap; gap: 4px; }
    .ats-kw-tag {
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.75rem;
    }
    .ats-kw-tag.matched { background: rgba(74, 222, 128, 0.15); color: var(--green); }
    .ats-kw-tag.missing { background: rgba(251, 146, 60, 0.15); color: var(--orange); }

    /* Theme Picker */
    .theme-picker-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    .theme-picker {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      width: 90%;
      max-width: 640px;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .theme-picker-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
    }
    .theme-picker-header h3 { font-size: 1.1rem; }
    .theme-picker-close {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 1.4rem;
      cursor: pointer;
    }
    .theme-picker-close:hover { color: var(--text); }
    .theme-picker-search { padding: 12px 20px; }
    .theme-picker-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 8px;
      padding: 0 20px 20px;
      overflow-y: auto;
    }
    .theme-picker-card {
      background: var(--bg);
      border: 2px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      cursor: pointer;
      transition: all 0.15s;
      text-align: left;
    }
    .theme-picker-card:hover { border-color: var(--accent); background: rgba(88, 166, 255, 0.06); }
    .theme-picker-card.active { border-color: var(--accent); background: rgba(88, 166, 255, 0.12); }
    .theme-picker-card.disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .theme-picker-name { font-weight: 700; font-size: 0.9rem; margin-bottom: 4px; color: var(--text); }
    .theme-picker-desc { font-size: 0.8rem; color: var(--muted); line-height: 1.3; }
    .theme-picker-meta { font-size: 0.75rem; color: var(--muted); margin-top: 6px; }
    .theme-picker-cli { font-size: 0.7rem; color: var(--orange); margin-top: 4px; }
    .theme-picker-empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 20px;
      color: var(--muted);
    }

    /* Responsive */
    @media (max-width: 768px) {
      .toolbar { flex-wrap: wrap; height: auto; padding: 8px; }
      .toolbar-right { flex-wrap: wrap; }
      .toolbar-btn { padding: 4px 6px; font-size: 0.75rem; }
      .builder-main { flex-direction: column; }
      .builder-editor { width: 100% !important; height: 50%; }
      .builder-preview { width: 100% !important; height: 50%; }
      .builder-divider {
        width: 100%;
        height: 6px;
        cursor: row-resize;
      }
      .builder-ats {
        width: 100%;
        height: 50%;
        top: auto;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#94a3b8;flex-direction:column;gap:12px">
      <div class="spinner" style="width:32px;height:32px;border:3px solid #334155;border-top-color:#38bdf8;border-radius:50%;animation:spin .6s linear infinite"></div>
      <span>Loading resuml builder...</span>
    </div>
  </div>
  <script type="module" src="./app/main.js"></script>
</body>
</html>
