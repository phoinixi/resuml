name: Bundle Themes

on:
  schedule:
    - cron: '0 3 * * 1' # Weekly on Monday at 3am UTC
  workflow_dispatch:
    inputs:
      all:
        description: 'Discover and bundle ALL themes from npm'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  bundle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Bundle themes
        run: node scripts/bundle-themes.js --all

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/themes/
          if git diff --staged --quiet; then
            echo "No theme changes to commit"
          else
            git commit -m "chore: update bundled themes [skip ci]"
            git push
          fi
